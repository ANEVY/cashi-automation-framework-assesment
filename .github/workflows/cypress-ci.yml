name: Cypress Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - spec: cypress/e2e/api/restfulbooker-api.spec.js
            spec_name: restfulbooker-api
          - spec: cypress/e2e/web/home.spec.js
            spec_name: home
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.11.1'

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress test
        run: npx cypress run --spec ${{ matrix.spec }} --env configEnv=dev
          
      - name: Upload Mochawesome Report
        uses: actions/upload-artifact@v4
        with:
          name: mochawesome-report-${{ github.run_number }}-${{ matrix.spec_name }}
          path: reports/mochawesome/

  merge-report:
    needs: cypress-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: reports/mochawesome/
          flatten: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.11.1'

      - name: Install dependencies for report
        run: npm ci

      - name: Merge and generate Mochawesome report
        run: npm run report:html

      - name: Upload Final Mochawesome Report
        uses: actions/upload-artifact@v4
        with:
          name: mochawesome-final
          path: reports/mochawesome/final/